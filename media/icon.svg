<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Background gradient matching VS Code dark theme -->
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2140"/>
    </linearGradient>
    <!-- Elvatis blue gradient -->
    <linearGradient id="blue" x1="30" y1="20" x2="98" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5CC8F5"/>
      <stop offset="100%" stop-color="#2BA4E0"/>
    </linearGradient>
    <!-- Subtle glow behind text -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded rectangle background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Elvatis-inspired hexagonal ring -->
  <g transform="translate(64, 64)">
    <path fill-rule="evenodd" fill="url(#blue)" d="
      M0 -44
      L38.1 -22
      L38.1 22
      L0 44
      L-38.1 22
      L-38.1 -22
      Z
      M0 -33
      L-28.6 -16.5
      L-28.6 16.5
      L0 33
      L28.6 16.5
      L28.6 -16.5
      Z
    "/>

    <!-- "cAI" text mark -->
    <text x="0" y="7" text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="28" font-weight="800" letter-spacing="-1"
          fill="url(#blue)" filter="url(#glow)">cAI</text>

    <!-- Small accent dots on hex vertices -->
    <circle cx="0" cy="-44" r="3.5" fill="#5CC8F5" opacity="0.6"/>
    <circle cx="38.1" cy="-22" r="3" fill="#5CC8F5" opacity="0.4"/>
    <circle cx="38.1" cy="22" r="3" fill="#5CC8F5" opacity="0.4"/>
    <circle cx="0" cy="44" r="3.5" fill="#5CC8F5" opacity="0.6"/>
    <circle cx="-38.1" cy="22" r="3" fill="#5CC8F5" opacity="0.4"/>
    <circle cx="-38.1" cy="-22" r="3" fill="#5CC8F5" opacity="0.4"/>
  </g>
</svg>
