name: Supply Chain Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: homeofe/supply-chain-guard@37cf622e249229d04b49f2ee89068c6e45b28adf  # v5.2.44
        with:
          fail-on: critical
          comment-on-pr: true
